spring.application.name=findmybook

spring.datasource.url=jdbc:postgresql://localhost:55432/wayfindingdb
spring.datasource.username=wayfinding
spring.datasource.password=wayfinding
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect


spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.cache.type=redis
# lives in cache for ten minutes
spring.cache.redis.time-to-live=10m
logging.level.org.springframework.data.redis=DEBUG
logging.level.org.springframework.boot.autoconfigure.cache=DEBUG
logging.level.org.springframework.cache=TRACE

server.port=8080
server.address=0.0.0.0