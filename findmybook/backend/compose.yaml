services:
  postgres:
    image: postgres:16
    container_name: wayfinding-postgres
    environment:
      POSTGRES_USER: wayfinding
      POSTGRES_PASSWORD: wayfinding
      POSTGRES_DB: wayfindingdb
    ports:
      - "55432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  redis:
    image: redis:7
    container_name: wayfinding-redis
    ports:
      - "6379:6379"

volumes:
  pgdata: